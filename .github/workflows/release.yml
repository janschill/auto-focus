name: Release

on:
  push:
    branches:
      - main
    paths:
      # Only run when macOS app project file changes (MARKETING_VERSION)
      - "auto-focus.xcodeproj/project.pbxproj"
      # Also run when app source code changes (in case version was bumped in a previous commit)
      - "auto-focus/**"
  workflow_dispatch:
    inputs:
      beta:
        description: "Is this a beta release?"
        required: false
        type: boolean
        default: false
      beta_version:
        description: "Beta version string (e.g. 1.15.0-beta.1)"
        required: false
        type: string

jobs:
  release:
    name: Build, Sign, Notarize, and Release
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Full history needed for git tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all tags
        run: |
          git fetch --tags --force
          echo "✅ Fetched all tags"

      - name: Validate beta inputs
        if: inputs.beta == true
        run: |
          VERSION="${{ inputs.beta_version }}"
          if [ -z "$VERSION" ]; then
            echo "❌ beta_version is required when beta is true"
            exit 1
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$'; then
            echo "❌ Invalid beta version format: $VERSION"
            echo "   Expected format: X.Y.Z-beta.N (e.g. 1.15.0-beta.1)"
            exit 1
          fi
          echo "✅ Beta version validated: $VERSION"

      - name: Check if MARKETING_VERSION changed
        id: version_check
        if: inputs.beta != true
        run: |
          # Get current MARKETING_VERSION from project file
          CURRENT_VERSION=$(grep -m 1 "MARKETING_VERSION = " auto-focus.xcodeproj/project.pbxproj | sed 's/.*MARKETING_VERSION = \([^;]*\);.*/\1/' | head -n 1)

          # Get latest tag
          LATEST_TAG=$(git tag -l "v1.*.*" --sort=-version:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            # No tag exists, this is the first release
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "✅ No existing tag found - will create first release"
            exit 0
          fi

          # Extract version from tag (remove 'v' prefix)
          TAG_VERSION=${LATEST_TAG#v}

          # Compare versions
          if [ "$CURRENT_VERSION" != "$TAG_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "✅ Version changed: $TAG_VERSION -> $CURRENT_VERSION"
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Version unchanged ($CURRENT_VERSION) - skipping release"
            echo "   To release, bump MARKETING_VERSION in auto-focus.xcodeproj/project.pbxproj"
          fi

      - name: Determine if release should proceed
        id: should_release
        run: |
          if [ "${{ inputs.beta }}" = "true" ]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
            echo "is_beta=true" >> $GITHUB_OUTPUT
            echo "✅ Beta release requested — proceeding"
          elif [ "${{ steps.version_check.outputs.version_changed }}" = "true" ]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
            echo "is_beta=false" >> $GITHUB_OUTPUT
            echo "✅ Stable release — version changed, proceeding"
          else
            echo "proceed=false" >> $GITHUB_OUTPUT
            echo "is_beta=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No release needed"
          fi

      - name: Show the currently detailed version of Xcode for CLI
        shell: bash
        run: xcodebuild -version

      - name: Select Xcode version
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          # Use the latest available Xcode on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Selected Xcode: $XCODE_PATH"
          sudo xcode-select -switch "$XCODE_PATH"

      - name: Show Build Version
        shell: bash
        run: xcodebuild -version

      - name: Clear DerivedData cache for fresh build
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          # Remove any cached DerivedData to ensure fresh build
          rm -rf ~/Library/Developer/Xcode/DerivedData/auto-focus-*
          rm -rf build/DerivedData
          echo "✅ Cleared DerivedData cache for fresh build"

      - name: Resolve package dependencies
        if: steps.should_release.outputs.proceed == 'true'
        run: xcodebuild -resolvePackageDependencies -project auto-focus.xcodeproj

      - name: Import code signing certificate
        if: steps.should_release.outputs.proceed == 'true'
        uses: apple-actions/import-codesign-certs@v2
        id: import-certs
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify certificate import
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          echo "Available signing identities:"
          security find-identity -v -p codesigning

          # Check specifically for Developer ID Application
          if ! security find-identity -v -p codesigning | grep -q "Developer ID Application"; then
            echo "❌ Developer ID Application certificate not found"
            echo "All identities:"
            security find-identity -v -p codesigning
            exit 1
          fi

          echo "✅ Certificate verified"

      - name: Calculate version
        id: version
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          if [ "${{ steps.should_release.outputs.is_beta }}" = "true" ]; then
            VERSION="${{ inputs.beta_version }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
            echo "✅ Using beta version: $VERSION"
          else
            # Read MARKETING_VERSION from project file (we already verified it changed)
            PROJECT_VERSION=$(grep -m 1 "MARKETING_VERSION = " auto-focus.xcodeproj/project.pbxproj | sed 's/.*MARKETING_VERSION = \([^;]*\);.*/\1/' | head -n 1)
            echo "version=$PROJECT_VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$PROJECT_VERSION" >> $GITHUB_OUTPUT
            echo "✅ Using MARKETING_VERSION: $PROJECT_VERSION"
          fi

      - name: Auto-increment build number
        if: steps.should_release.outputs.proceed == 'true' && steps.should_release.outputs.is_beta != 'true'
        run: |
          # Get current build number from project file
          CURRENT_BUILD=$(grep -m 1 "CURRENT_PROJECT_VERSION = " auto-focus.xcodeproj/project.pbxproj | sed 's/.*CURRENT_PROJECT_VERSION = \([^;]*\);.*/\1/' | head -n 1 | tr -d ' ')

          # Increment build number
          NEW_BUILD=$((CURRENT_BUILD + 1))

          echo "📦 Incrementing build number: $CURRENT_BUILD -> $NEW_BUILD"

          # Update build number in all configurations (Debug, Release, Test targets)
          # Use sed to replace all occurrences of CURRENT_PROJECT_VERSION = <number> with the new build number
          sed -i.bak "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $NEW_BUILD/g" auto-focus.xcodeproj/project.pbxproj
          rm -f auto-focus.xcodeproj/project.pbxproj.bak

          # Verify the change
          VERIFIED_BUILD=$(grep -m 1 "CURRENT_PROJECT_VERSION = " auto-focus.xcodeproj/project.pbxproj | sed 's/.*CURRENT_PROJECT_VERSION = \([^;]*\);.*/\1/' | head -n 1 | tr -d ' ')
          if [ "$VERIFIED_BUILD" = "$NEW_BUILD" ]; then
            echo "✅ Build number updated successfully to $NEW_BUILD"
          else
            echo "❌ Failed to update build number. Expected $NEW_BUILD, got $VERIFIED_BUILD"
            exit 1
          fi

          # Commit the build number change
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add auto-focus.xcodeproj/project.pbxproj
          git commit -m "chore: Auto-increment build number to $NEW_BUILD" || echo "No changes to commit (build number already updated)"

      - name: Build and archive app
        if: steps.should_release.outputs.proceed == 'true'
        env:
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: |
          # List available certificates for debugging
          echo "Checking for signing certificate before build..."
          security find-identity -v -p codesigning | grep "Developer ID Application" || echo "Warning: Certificate not found"

          # Remove any existing archive to force full rebuild
          rm -rf build/auto-focus.xcarchive
          rm -rf build/DerivedData

          # Clean build first to ensure folder-based groups are properly recognized
          echo "🧹 Running clean build..."
          xcodebuild clean \
            -project auto-focus.xcodeproj \
            -scheme auto-focus \
            -configuration Release || echo "Clean completed (may show warnings)"

          # List source files to verify they're visible to xcodebuild
          echo "📁 Checking source files in auto-focus directory..."
          find auto-focus -name "*.swift" -type f | head -20
          echo "Total Swift files: $(find auto-focus -name '*.swift' -type f | wc -l)"

          # Build archive with clean build forced
          # Using -destination to ensure proper platform targeting
          xcodebuild archive \
            -project auto-focus.xcodeproj \
            -scheme auto-focus \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/auto-focus.xcarchive \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="Developer ID Application: Jan Schill (LKQJ2JG34Y)" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=LKQJ2JG34Y \
            HMAC_SECRET="$HMAC_SECRET" \
            ONLY_ACTIVE_ARCH=NO || exit $?

          # Verify the archive contains the actual executable
          EXECUTABLE_PATH="build/auto-focus.xcarchive/Products/Applications/auto-focus.app/Contents/MacOS/auto-focus"
          if [ ! -f "$EXECUTABLE_PATH" ]; then
            echo "❌ ERROR: Build failed - executable not found at $EXECUTABLE_PATH"
            echo "Archive contents:"
            find build/auto-focus.xcarchive -type f | head -50
            exit 1
          fi

          EXECUTABLE_SIZE=$(stat -f%z "$EXECUTABLE_PATH" 2>/dev/null || stat -c%s "$EXECUTABLE_PATH")
          echo "✅ Archive built successfully - executable size: $EXECUTABLE_SIZE bytes"

          if [ "$EXECUTABLE_SIZE" -lt 100000 ]; then
            echo "❌ ERROR: Executable is too small ($EXECUTABLE_SIZE bytes), build may have failed"
            exit 1
          fi

      - name: Extract app from archive
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          mkdir -p build
          cp -R build/auto-focus.xcarchive/Products/Applications/auto-focus.app build/auto-focus_temp.app

          # Verify the extracted app has the executable
          if [ ! -f "build/auto-focus_temp.app/Contents/MacOS/auto-focus" ]; then
            echo "❌ ERROR: Extracted app is missing executable"
            echo "App bundle contents:"
            find build/auto-focus_temp.app -type f
            exit 1
          fi
          echo "✅ App extracted to build/auto-focus_temp.app"

      - name: Code sign app
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          codesign --sign "Developer ID Application: Jan Schill (LKQJ2JG34Y)" \
            --timestamp \
            --options runtime \
            --deep \
            --force \
            build/auto-focus_temp.app

          # Verify signature
          codesign --verify --verbose build/auto-focus_temp.app
          echo "✅ Code signing verified"

      - name: Create ZIP for notarization
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          cd build
          zip -r auto-focus_notarization.zip auto-focus_temp.app
          echo "Created notarization ZIP"

      - name: Notarize app
        if: steps.should_release.outputs.proceed == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Submit for notarization
          xcrun notarytool submit build/auto-focus_notarization.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "✅ Notarization successful"

      - name: Staple notarization ticket
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          xcrun stapler staple build/auto-focus_temp.app
          xcrun stapler validate build/auto-focus_temp.app
          echo "✅ Notarization ticket stapled"

      - name: Package app for distribution
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="Auto-Focus-v${VERSION}.zip"

          # Rename app for distribution (remove _temp suffix)
          cd build
          cp -R auto-focus_temp.app auto-focus.app

          if [ "${{ steps.should_release.outputs.is_beta }}" = "true" ]; then
            # Beta: write zip to build/ only (not docs/downloads/)
            zip -r ${ZIP_NAME} auto-focus.app
            echo "✅ Created build/${ZIP_NAME} (beta — not updating docs/downloads/)"
          else
            # Stable: write to docs/downloads/ for website distribution
            mkdir -p ../docs/downloads
            zip -r ../docs/downloads/${ZIP_NAME} auto-focus.app

            # Also create a copy for backward compatibility
            cd ../docs/downloads
            cp ${ZIP_NAME} Auto-Focus.zip
            cd ../..

            echo "✅ Created ${ZIP_NAME} and Auto-Focus.zip (for backward compatibility)"
          fi

          # Return to repo root for verification (cd build happened above)
          cd "$GITHUB_WORKSPACE"

          # Verify ZIP contents
          if [ "${{ steps.should_release.outputs.is_beta }}" = "true" ]; then
            ZIP_PATH="build/${ZIP_NAME}"
          else
            ZIP_PATH="docs/downloads/${ZIP_NAME}"
          fi

          if unzip -l ${ZIP_PATH} | grep -q "auto-focus.app/"; then
            echo "✅ App ZIP created successfully"
          else
            echo "❌ ERROR: ZIP does not contain auto-focus.app"
            echo "ZIP contents:"
            unzip -l ${ZIP_PATH} | head -20
            exit 1
          fi

      - name: Generate version.json
        if: steps.should_release.outputs.proceed == 'true' && steps.should_release.outputs.is_beta != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_HASH=$(git rev-parse --short HEAD)
          ZIP_NAME="Auto-Focus-v${VERSION}.zip"

          cat > docs/downloads/version.json << EOF
          {
            "version": "$VERSION",
            "build_date": "$BUILD_DATE",
            "commit_hash": "$COMMIT_HASH",
            "app_zip": "${ZIP_NAME}",
            "download_url": "https://auto-focus.app/downloads/${ZIP_NAME}",
            "min_macos": "14.0"
          }
          EOF

          echo "✅ Version file generated"
          echo "Version: $VERSION"
          echo "Build date: $BUILD_DATE"
          echo "Commit: $COMMIT_HASH"
          echo "ZIP filename: ${ZIP_NAME}"

      - name: Create git tag
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Check if tag already exists (shouldn't happen, but be safe)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "⚠️  Tag $TAG already exists - skipping tag creation"
          else
            git tag -a "$TAG" -m "Release $TAG"
            echo "✅ Created tag: $TAG"
          fi

      - name: Commit distribution files
        if: steps.should_release.outputs.proceed == 'true' && steps.should_release.outputs.is_beta != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="Auto-Focus-v${VERSION}.zip"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove old versioned zip files from git tracking (keep only the latest)
          git rm --cached --ignore-unmatch docs/downloads/Auto-Focus-v*.zip 2>/dev/null || true

          # Add new distribution files (versioned zip, backward-compat zip, extension, and version.json)
          git add docs/downloads/${ZIP_NAME} \
                  docs/downloads/Auto-Focus.zip \
                  docs/downloads/version.json \
                  auto-focus.xcodeproj/project.pbxproj

          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Release ${{ steps.version.outputs.tag }}: Update distribution files"
            echo "✅ Committed distribution files"
          fi

      - name: Generate release notes
        id: release_notes
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_HASH=$(git rev-parse --short HEAD)

          if [ "${{ steps.should_release.outputs.is_beta }}" = "true" ]; then
            cat > /tmp/release_notes.md << EOF
          ## Auto-Focus $TAG (Beta)

          > **This is a pre-release build for testing.** It will not appear in the in-app update checker. Download and install manually.

          ### Release Information
          - **Version**: $VERSION
          - **Build Date**: $BUILD_DATE
          - **Commit**: $COMMIT_HASH

          ### Installation
          1. Download Auto-Focus-v${VERSION}.zip
          2. Extract and move Auto-Focus.app to Applications
          3. Launch and configure focus apps

          ### System Requirements
          - macOS Sonoma (14.0) or later

          ---

          🔗 **Website**: https://auto-focus.app
          EOF
          else
            cat > /tmp/release_notes.md << EOF
          ## Auto-Focus $TAG

          ### Release Information
          - **Version**: $VERSION
          - **Build Date**: $BUILD_DATE
          - **Commit**: $COMMIT_HASH

          ### Installation
          1. Download Auto-Focus.zip
          2. Extract and move Auto-Focus.app to Applications
          3. Install the included Shortcut
          4. Launch and configure focus apps

          ### System Requirements
          - macOS Sonoma (14.0) or later

          ---

          🔗 **Website**: https://auto-focus.app
          EOF
          fi

          echo "✅ Release notes generated"

      - name: Create GitHub release (stable)
        if: steps.should_release.outputs.proceed == 'true' && steps.should_release.outputs.is_beta != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_notes.md
          files: |
            docs/downloads/Auto-Focus-v${{ steps.version.outputs.version }}.zip
            docs/downloads/Auto-Focus.zip
            docs/downloads/version.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release (beta)
        if: steps.should_release.outputs.proceed == 'true' && steps.should_release.outputs.is_beta == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Beta ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_notes.md
          files: |
            build/Auto-Focus-v${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tag and commits
        if: steps.should_release.outputs.proceed == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Push tag first
          git push origin "$TAG" || echo "Tag may already exist"

          if [ "${{ steps.should_release.outputs.is_beta }}" = "true" ]; then
            echo "✅ Beta release — pushed tag only (no commits to main)"
          else
            # Check if there are commits to push
            if git diff --quiet HEAD origin/main 2>/dev/null; then
              echo "No new commits to push"
            else
              git push origin main
              echo "✅ Pushed commits to main"
            fi
          fi

      - name: Cleanup
        if: always()
        run: |
          # The apple-actions/import-codesign-certs action handles cleanup automatically
          echo "✅ Cleanup complete"
